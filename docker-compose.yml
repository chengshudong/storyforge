
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novel2drama
      POSTGRES_PASSWORD: novel2drama
      POSTGRES_DB: novel2drama
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel2drama"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  cosyvoice:
    image: cosyvoice/cosyvoice:latest
    ports:
      - "5001:5001"
    volumes:
      - cosyvoice_models:/app/models
      - cosyvoice_output:/app/output
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  gptsovits:
    image: gptsovits/gptsovits:latest
    ports:
      - "5002:5002"
    volumes:
      - gptsovits_models:/app/models
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  wan21:
    image: wan21/wan21:latest
    ports:
      - "7860:7860"
    volumes:
      - wan21_models:/app/models
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  cogvideox:
    image: cogvideox/cogvideox:latest
    ports:
      - "7861:7861"
    volumes:
      - cogvideox_models:/app/models
    environment:
      - CUDA_VISIBLE_DEVICES=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7861/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  celery-video:
    build:
      context: ./backend
    command: celery -A infra.celery_app worker -Q video_generation --concurrency=1 --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WAN21_BASE_URL: http://wan21:7860
      COGVIDEOX_BASE_URL: http://cogvideox:7861
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

  celery:
    build:
      context: ./backend
    command: celery -A infra.celery_app worker --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      COSYVOICE_BASE_URL: http://cosyvoice:5001
      GPTSOVITS_BASE_URL: http://gptsovits:5002
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: novel2drama
      POSTGRES_USER: novel2drama
      POSTGRES_PASSWORD: novel2drama
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_HOST: minio
      MINIO_PORT: 9000
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      COSYVOICE_BASE_URL: http://cosyvoice:5001
      GPTSOVITS_BASE_URL: http://gptsovits:5002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  cosyvoice_models:
  cosyvoice_output:
  gptsovits_models:
  wan21_models:
  cogvideox_models:
