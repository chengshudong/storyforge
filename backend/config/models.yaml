# Model Registry — defines default provider and model per task.
# All model calls must route through ModelRouter using this registry.

providers:
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url_env: DEEPSEEK_BASE_URL
    default_base_url: https://api.deepseek.com
    models:
      - deepseek-chat
      - deepseek-reasoner

  openai:
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
    default_base_url: https://api.openai.com/v1
    models:
      - gpt-4o
      - gpt-4o-mini

  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4-6
      - claude-haiku-4-5

  gemini:
    api_key_env: GEMINI_API_KEY
    models:
      - gemini-2.5-flash
      - gemini-2.5-pro

  openrouter:
    api_key_env: OPENROUTER_API_KEY
    default_base_url: https://openrouter.ai/api/v1
    models:
      - openai/gpt-4o
      - anthropic/claude-sonnet-4-6

  local:
    models:
      - all-MiniLM-L6-v2

tasks:
  summary:
    provider: deepseek
    model: deepseek-chat

  episode:
    provider: deepseek
    model: deepseek-chat

  scene:
    provider: deepseek
    model: deepseek-chat

  character:
    provider: deepseek
    model: deepseek-chat

  dialogue:
    provider: deepseek
    model: deepseek-chat

  narration:
    provider: deepseek
    model: deepseek-chat

  embedding:
    provider: local
    model: all-MiniLM-L6-v2

  rerank:
    provider: local
    model: bge-reranker-base

fallback:
  - deepseek
  - openai
  - anthropic
  - gemini
  - openrouter
  - local

degrade:
  summary:
    provider: local
    model: all-MiniLM-L6-v2
  episode:
    provider: local
    model: all-MiniLM-L6-v2
  scene:
    provider: local
    model: all-MiniLM-L6-v2
  character:
    provider: local
    model: all-MiniLM-L6-v2
  embedding:
    provider: local
    model: all-MiniLM-L6-v2
